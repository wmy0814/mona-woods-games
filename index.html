<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mona Woods Games</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #fef9f3 0%, #fce8d4 100%);
  min-height: 100vh;
  padding: 40px 20px;
  color: #3a2a1a;
}
.container { max-width: 960px; margin: 0 auto; }
.back {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  background: #fff;
  border-radius: 20px;
  color: #6b4f3a;
  text-decoration: none;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.back:hover { background: #f5e6d3; }
h1 { font-size: 32px; margin-bottom: 8px; color: #6b3a1a; }
.subtitle { font-size: 16px; color: #8b6f5a; margin-bottom: 30px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: #3a2a1a;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: transform 0.15s, box-shadow 0.15s;
  display: block;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
.card-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.card-desc { font-size: 13px; color: #8b6f5a; }
.card.disabled { background: #f5f0e8; color: #b09a82; cursor: not-allowed; pointer-events: none; }
.logo { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="#">← 返回上级</a>
  <img class="logo" src="../logo.png" alt="logo">
  <h1>Mona Woods Games</h1>
  <div class="subtitle">汐汐的英语单词闯关游戏集合</div>
  <div class="grid">
    <a class="card" href="phonics/"><div class="card-title">🔤 自然拼读系列</div><div class="card-desc">Star Phonics 1 / 2 单词闯关</div></a>
    <a class="card" href="pu/"><div class="card-title">📘 Power Up 系列</div><div class="card-desc">PU Start / PU 1 单词闯关</div></a>
    <a class="card" href="nce/"><div class="card-title">📕 NCE 系列</div><div class="card-desc">新概念一册/二册单词闯关</div></a>
    <a class="card" href="pep/"><div class="card-title">📗 PEP 系列</div><div class="card-desc">人教版 3-6 年级单词闯关</div></a>
  </div>
</div>
</body>
</html><!-- Fri Jun 12 01:26:47 CST 2026 -->

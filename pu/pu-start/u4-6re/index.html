<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PU Start · 阶段复习 U4-6</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #fef9f3 0%, #fce8d4 100%);
  min-height: 100vh;
  padding: 40px 20px;
  color: #3a2a1a;
}
.container { max-width: 960px; margin: 0 auto; }
.back {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  background: #fff;
  border-radius: 20px;
  color: #6b4f3a;
  text-decoration: none;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.back:hover { background: #f5e6d3; }
h1 { font-size: 32px; margin-bottom: 8px; color: #6b3a1a; }
.subtitle { font-size: 16px; color: #8b6f5a; margin-bottom: 30px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: #3a2a1a;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: transform 0.15s, box-shadow 0.15s;
  display: block;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
.card-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.card-desc { font-size: 13px; color: #8b6f5a; }
.card.disabled { background: #f5f0e8; color: #b09a82; cursor: not-allowed; pointer-events: none; }
.logo { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="../../">← 返回上级</a>
  
  <h1>PU Start · 阶段复习 U4-6</h1>
  <div class="subtitle">Unit 4 / 5 / 6 三单元综合</div>
  <div class="grid">
    <div class="card disabled"><div class="card-title">阶段复习游戏</div><div class="card-desc">U4-6 综合闯关</div></div>
  </div>
</div>
</body>
</html>

  .btn-next { background:#6BCB77; color:#fff; }

  .choice-dot { width:10px; height:10px; border-radius:50%; background:#d0ebe6; transition:all 0.3s; }
  .choice-dot.mastered { background:#6BCB77; }
  .choice-dot.pending { background:#FFD93D; }
  .choice-dot.current { background:#5ec4b6; transform:scale(1.3); }
  .choice-words { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choice-btn { font-family:'Fredoka One',cursive; font-size:1.2rem; padding:12px 14px; background:#fff; border:3px solid #5ec4b6; border-radius:14px; color:#2d6b5e; cursor:pointer; transition:all 0.15s; }
  .choice-btn:hover { background:#e8f8f5; transform:scale(1.03); border-color:#3ba99c; }
  .choice-btn:active { transform:scale(0.98); }
  .choice-btn.correct { background:#6BCB77; border-color:#6BCB77; color:#fff; animation:pop 0.3s ease; }
  .choice-btn.wrong { background:#FF6B6B; border-color:#FF6B6B; color:#fff; animation:shake 0.4s ease; }
  .spell-emoji { font-size:3.5rem; text-align:center; margin-bottom:4px; }
  .spell-zh { font-size:1.4rem; text-align:center; color:#2d6b5e; font-weight:800; margin-bottom:14px; }
  .spell-slots { display:flex; gap:6px; justify-content:center; margin-bottom:16px; min-height:48px; flex-wrap:wrap; }
  .spell-slot { min-width:40px; height:44px; padding:0 6px; background:#e8f8f5; border:2px dashed #5ec4b6; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.1rem; color:#2d6b5e; transition:all 0.2s; }
  .spell-slot.filled { background:#5ec4b6; color:#fff; border-style:solid; cursor:pointer; }
  .spell-slot.filled:hover { background:#4db3a5; }
  .spell-slot.correct { background:#6BCB77; border-color:#6BCB77; color:#fff; animation:pop 0.3s ease; }
  .spell-slot.wrong { background:#FF6B6B; border-color:#FF6B6B; color:#fff; animation:shake 0.4s ease; }
  .letter-pool { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .letter-tile { padding:7px 12px; background:#FFD93D; color:#6B4226; border-radius:10px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 0 rgba(107,66,38,0.15); user-select:none; }
  .letter-tile:hover { transform:translateY(-3px); }
  .letter-tile:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(107,66,38,0.15); }
  .letter-tile.used { opacity:0.3; pointer-events:none; transform:scale(0.9); }
  .result-card { background:rgba(255,255,255,0.95); border-radius:28px; padding:30px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.15); max-width:520px; width:100%; }

  .weak-words h4 { font-size:1rem; color:#e65100; margin-bottom:8px; }
  .weak-words-list { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .weak-word { background:#ffcc80; color:#5d4037; padding:4px 10px; border-radius:20px; font-size:0.85rem; font-weight:600; }
  .feedback-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border-radius:24px; padding:20px 40px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.25); z-index:1000; transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275); }

  .feedback-popup .msg { font-family:'Fredoka One',cursive; font-size:1.2rem; color:#2d6b5e; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-120px) rotate(720deg);opacity:0} }
  .confetti { position:fixed; width:10px; height:10px; border-radius:50%; animation:confetti 1s ease forwards; z-index:999; pointer-events:none; }

    .choice-emoji { font-size:3.5rem; }

// Game state
let l1Queue = [];
let l1Mastered = new Set();
let l1Errors = {};
let l1TotalAttempts = 0;
let l1FirstCorrect = 0;

let l2Queue = [];
let l2Mastered = new Set();
let l2Errors = {};
let l2TotalAttempts = 0;
let l2FirstCorrect = 0;

let currentSlots = [];
let currentPool = [];
let isLocked = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initStartScreen() {
  document.getElementById('startStats').textContent = `共 ${CHOICE_DATA.length} 个单词 · 2关挑战`;
}

function startGame() {
  // Reset all state
  l1Queue = shuffle([...Array(CHOICE_DATA.length).keys()]);
  l1Mastered = new Set();
  l1Errors = {};
  l1TotalAttempts = 0;
  l1FirstCorrect = 0;
  
  l2Queue = shuffle([...Array(SPELL_DATA.length).keys()]);
  l2Mastered = new Set();
  l2Errors = {};
  l2TotalAttempts = 0;
  l2FirstCorrect = 0;
  
  currentSlots = [];
  currentPool = [];
  isLocked = false;
  
  showScreen('level1Screen');
  buildChoiceQ();
}

function buildProgressDots(queue, mastered, currentIdx) {
  return queue.map((_, i) => {
    let cls = 'choice-dot';
    if (mastered.has(i)) cls += ' mastered';
    else if (i < currentIdx) cls += ' pending';
    else if (i === currentIdx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function buildChoiceQ() {
  if (l1Queue.length === 0) {
    showLevel2();
    return;
  }
  
  const currentWordIdx = l1Queue[0];
  document.getElementById('choiceProgress').innerHTML = buildProgressDots(l1Queue, l1Mastered, 0);
  document.getElementById('l1ProgressText').textContent = `已掌握 ${l1Mastered.size}/${CHOICE_DATA.length}`;
  
  const w = CHOICE_DATA[currentWordIdx];
  document.getElementById('choiceEmoji').textContent = w.emoji;
  document.getElementById('choiceZh').textContent = w.zh;
  
  let opts = [w.en];
  const all = CHOICE_DATA.map(x => x.en).filter(e => e !== w.en);
  const sh = shuffle(all);
  for (let i = 0; i < 3 && i < sh.length; i++) opts.push(sh[i]);
  opts = shuffle(opts);
  
  document.getElementById('choiceWords').innerHTML = opts.map(o => 
    `<button class="choice-btn" onclick="checkChoice(this,'${o}')">${o}</button>`
  ).join('');
}

function checkChoice(btn, selected) {
  if (isLocked) return;
  
  const currentWordIdx = l1Queue[0];
  const correct = CHOICE_DATA[currentWordIdx].en;
  
  l1TotalAttempts++;
  
  if (selected === correct) {
    isLocked = true;
    btn.classList.add('correct');
    
    if (!l1Mastered.has(currentWordIdx)) {
      l1Mastered.add(currentWordIdx);
      l1FirstCorrect++;
    }
    
    showFB('✅', '太棒了！');
    setTimeout(() => {
      hideFB();
      // Remove from queue
      l1Queue.shift();
      isLocked = false;
      buildChoiceQ();
    }, 800);
  } else {
    btn.classList.add('wrong');
    
    if (!l1Errors[currentWordIdx]) l1Errors[currentWordIdx] = 0;
    l1Errors[currentWordIdx]++;
    
    // Reinsert the word into random position (at least 3 positions later)
    setTimeout(() => {
      btn.classList.remove('wrong');
      const insertPos = Math.min(3 + Math.floor(Math.random() * 3), l1Queue.length);
      l1Queue.splice(insertPos, 0, l1Queue.shift());
      buildChoiceQ();
    }, 500);
  }
}

function showLevel2() {
  l2Queue = shuffle([...Array(SPELL_DATA.length).keys()]);
  showScreen('level2Screen');
  buildSpellQ();
}

function buildSpellQ() {
  if (l2Queue.length === 0) {
    showResult();
    return;
  }
  
  const currentWordIdx = l2Queue[0];
  document.getElementById('spellProgress').innerHTML = buildProgressDots(l2Queue, l2Mastered, 0);
  document.getElementById('l2ProgressText').textContent = `已掌握 ${l2Mastered.size}/${SPELL_DATA.length}`;
  
  const d = SPELL_DATA[currentWordIdx];
  document.getElementById('spellEmoji').textContent = d.emoji;
  document.getElementById('spellZh').textContent = d.zh;
  
  currentSlots = new Array(d.parts.length).fill(null);
  document.getElementById('spellSlots').innerHTML = d.parts.map((_, i) => 
    `<div class="spell-slot" data-slot="${i}" onclick="removeSlot(${i})"></div>`
  ).join('');
  
  // Build letter pool
  const correctParts = [...d.parts];
  const allParts = new Set();
  SPELL_DATA.forEach(x => x.parts.forEach(p => allParts.add(p)));
  const distractors = shuffle([...allParts].filter(p => !correctParts.includes(p))).slice(0, Math.min(4, [...allParts].filter(p => !correctParts.includes(p)).length));
  currentPool = shuffle([...correctParts, ...distractors]);
  
  document.getElementById('letterPool').innerHTML = currentPool.map((l, i) => 
    `<div class="letter-tile" data-pi="${i}" onclick="addSlot(${i})">${l}</div>`
  ).join('');
}

function addSlot(poolIdx) {
  const tile = document.querySelector(`.letter-tile[data-pi="${poolIdx}"]`);
  if (tile.classList.contains('used')) return;
  
  const emptySlot = currentSlots.indexOf(null);
  if (emptySlot === -1) return;
  
  const letter = currentPool[poolIdx];
  currentSlots[emptySlot] = { letter, poolIdx };
  tile.classList.add('used');
  
  const slotEl = document.querySelector(`.spell-slot[data-slot="${emptySlot}"]`);
  slotEl.textContent = letter;
  slotEl.classList.add('filled');
  
  if (!currentSlots.includes(null)) {
    checkSpell();
  }
}

function removeSlot(slotIdx) {
  const data = currentSlots[slotIdx];
  if (!data) return;
  
  const slotEl = document.querySelector(`.spell-slot[data-slot="${slotIdx}"]`);
  slotEl.textContent = '';
  slotEl.classList.remove('filled');
  
  document.querySelector(`.letter-tile[data-pi="${data.poolIdx}"]`).classList.remove('used');
  currentSlots[slotIdx] = null;
}

function checkSpell() {
  const currentWordIdx = l2Queue[0];
  const d = SPELL_DATA[currentWordIdx];
  const answer = currentSlots.map(s => s.letter).join('');
  const correct = d.parts.join('');
  
  l2TotalAttempts++;
  
  if (answer === correct) {
    document.querySelectorAll('.spell-slot').forEach(s => s.classList.add('correct'));
    
    if (!l2Mastered.has(currentWordIdx)) {
      l2Mastered.add(currentWordIdx);
      l2FirstCorrect++;
    }
    
    showFB('🎉', '拼对了！');
    setTimeout(() => {
      hideFB();
      l2Queue.shift();
      buildSpellQ();
    }, 800);
  } else {
    document.querySelectorAll('.spell-slot.filled').forEach(s => s.classList.add('wrong'));
    
    if (!l2Errors[currentWordIdx]) l2Errors[currentWordIdx] = 0;
    l2Errors[currentWordIdx]++;
    
    setTimeout(() => {
      currentSlots.forEach((s, i) => { if (s) removeSlot(i); });
      document.querySelectorAll('.spell-slot').forEach(s => s.classList.remove('wrong'));
      
      // Reinsert the word into random position (at least 3 positions later)
      const insertPos = Math.min(3 + Math.floor(Math.random() * 3), l2Queue.length);
      l2Queue.splice(insertPos, 0, l2Queue.shift());
      buildSpellQ();
    }, 600);
  }
}

function showFB(icon, msg) {
  const popup = document.getElementById('feedbackPopup');
  document.getElementById('feedbackIcon').textContent = icon;
  document.getElementById('feedbackMsg').textContent = msg;
  popup.classList.add('show');
}

function hideFB() {
  document.getElementById('feedbackPopup').classList.remove('show');
}

function showResult() {
  const totalWords = CHOICE_DATA.length + SPELL_DATA.length;
  const totalFirstCorrect = l1FirstCorrect + l2FirstCorrect;
  const totalFirstAttempts = l1TotalAttempts + l2TotalAttempts;
  const firstTimeAcc = Math.round((totalFirstCorrect / totalFirstAttempts) * 100);
  
  // Find weak words (error count >= 2 in either level)
  const weakWords = [];
  for (const idx in l1Errors) {
    if (l1Errors[idx] >= 2) {
      weakWords.push({ idx: parseInt(idx), errors: l1Errors[idx], type: 'choice' });
    }
  }
  for (const idx in l2Errors) {
    if (l2Errors[idx] >= 2) {
      weakWords.push({ idx: parseInt(idx), errors: l2Errors[idx], type: 'spell' });
    }
  }
  weakWords.sort((a, b) => b.errors - a.errors);
  
  let trophy, title, stars;
  if (firstTimeAcc >= 90) {
    trophy = '🏆';
    title = '太厉害了！';
    stars = 3;
  } else if (firstTimeAcc >= 70) {
    trophy = '🌟';
    title = '做得不错！';
    stars = 2;
  } else {
    trophy = '💪';
    title = '继续加油！';
    stars = 1;
  }
  
  document.getElementById('resultTrophy').textContent = trophy;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  
  const statsHTML = `
    <strong>📊 闯关统计</strong><br>
    总词数：${totalWords}<br>
    掌握词数：${l1Mastered.size + l2Mastered.size}<br>
    总尝试次数：${totalFirstAttempts}<br>
    首次正确率：${firstTimeAcc}%<br>
    第1关：错${Object.keys(l1Errors).length}词 · 第2关：错${Object.keys(l2Errors).length}词
  `;
  document.getElementById('resultStats').innerHTML = statsHTML;
  
  // Show weak words
  const weakSection = document.getElementById('weakWordsSection');
  const weakList = document.getElementById('weakWordsList');
  
  if (weakWords.length > 0) {
    weakSection.style.display = 'block';
    weakList.innerHTML = weakWords.slice(0, 12).map(w => {
      const wordData = w.type === 'choice' ? CHOICE_DATA[w.idx] : SPELL_DATA[w.idx];
      return `<span class="weak-word">${wordData.en} (${w.errors}错)</span>`;
    }).join('');
  } else {
    weakSection.style.display = 'none';
  }
  
  showScreen('resultScreen');
  if (firstTimeAcc >= 90) confetti();
}

function confetti() {
  const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#5ec4b6', '#FF8E53'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i % 5];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = Math.random() * 60 + 40 + 'vh';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

function restartGame() {
  showScreen('startScreen');
}

// Init
initStartScreen();

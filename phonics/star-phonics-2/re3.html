<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启航班自然拼读总复习 - Mona Woods</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #a8e6cf 0%, #5ec4b6 50%, #3ba99c 100%);
    min-height: 100vh; overflow-x: hidden;
  }
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .screen.active { display:flex; }
  .game-logo { width:100px; height:100px; object-fit:contain; margin-bottom:10px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }
  .game-logo-sm { position:fixed; top:12px; left:12px; width:40px; height:40px; object-fit:contain; z-index:100; opacity:0.7; }
  .start-title { font-family:'Fredoka One',cursive; font-size:2.8rem; color:#2d2d2d; text-shadow:3px 3px 0 rgba(255,255,255,0.5); margin-bottom:5px; text-align:center; }
  .start-subtitle { font-size:1.2rem; color:#2d6b5e; font-weight:700; margin-bottom:20px; }
  .start-emojis { font-size:2.5rem; margin-bottom:20px; }
  .btn { font-family:'Fredoka One',cursive; font-size:1.4rem; padding:14px 44px; border:none; border-radius:50px; cursor:pointer; transition:all 0.2s; box-shadow:0 5px 0 rgba(0,0,0,0.12); }
  .btn:hover { transform:translateY(-3px); box-shadow:0 8px 0 rgba(0,0,0,0.12); }
  .btn:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,0.12); }
  .btn-start { background:#FFD93D; color:#6B4226; }
  .btn-next { background:#6BCB77; color:#fff; }
  .btn-restart { background:#FF6B6B; color:#fff; }
  .level-header { text-align:center; color:#2d6b5e; margin-bottom:16px; }
  .level-header h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; text-shadow:2px 2px 0 rgba(255,255,255,0.4); }
  .level-header p { font-size:1.05rem; color:#3a7d6f; font-weight:600; }
  .game-card { background:rgba(255,255,255,0.95); border-radius:28px; padding:30px; max-width:600px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,0.15); }
  .choice-emoji { font-size:5rem; text-align:center; margin-bottom:8px; line-height:1.2; }
  .choice-zh { font-size:1.8rem; text-align:center; color:#2d6b5e; font-weight:800; margin-bottom:20px; }
  .choice-progress { display:flex; gap:6px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  .choice-dot { width:12px; height:12px; border-radius:50%; background:#d0ebe6; transition:all 0.3s; }
  .choice-dot.done { background:#6BCB77; }
  .choice-dot.current { background:#5ec4b6; transform:scale(1.3); }
  .choice-words { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .choice-btn { font-family:'Fredoka One',cursive; font-size:1.3rem; padding:14px 16px; background:#fff; border:3px solid #5ec4b6; border-radius:16px; color:#2d6b5e; cursor:pointer; transition:all 0.15s; }
  .choice-btn:hover { background:#e8f8f5; transform:scale(1.03); border-color:#3ba99c; }
  .choice-btn:active { transform:scale(0.98); }
  .choice-btn.correct { background:#6BCB77; border-color:#6BCB77; color:#fff; animation:pop 0.3s ease; }
  .choice-btn.wrong { background:#FF6B6B; border-color:#FF6B6B; color:#fff; animation:shake 0.4s ease; }
  .spell-emoji { font-size:4rem; text-align:center; margin-bottom:4px; }
  .spell-zh { font-size:1.5rem; text-align:center; color:#2d6b5e; font-weight:800; margin-bottom:16px; }
  .spell-slots { display:flex; gap:8px; justify-content:center; margin-bottom:20px; min-height:52px; flex-wrap:wrap; }
  .spell-slot { min-width:44px; height:48px; padding:0 8px; background:#e8f8f5; border:2px dashed #5ec4b6; border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.2rem; color:#2d6b5e; transition:all 0.2s; }
  .spell-slot.filled { background:#5ec4b6; color:#fff; border-style:solid; cursor:pointer; }
  .spell-slot.filled:hover { background:#4db3a5; }
  .spell-slot.correct { background:#6BCB77; border-color:#6BCB77; color:#fff; animation:pop 0.3s ease; }
  .spell-slot.wrong { background:#FF6B6B; border-color:#FF6B6B; color:#fff; animation:shake 0.4s ease; }
  .letter-pool { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .letter-tile { padding:8px 14px; background:#FFD93D; color:#6B4226; border-radius:12px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 0 rgba(107,66,38,0.15); user-select:none; }
  .letter-tile:hover { transform:translateY(-3px); }
  .letter-tile:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(107,66,38,0.15); }
  .letter-tile.used { opacity:0.3; pointer-events:none; transform:scale(0.9); }
  .result-card { background:rgba(255,255,255,0.95); border-radius:28px; padding:40px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.15); max-width:500px; width:100%; }
  .result-card .trophy { font-size:5rem; margin-bottom:10px; }
  .result-card h2 { font-family:'Fredoka One',cursive; font-size:2rem; color:#2d6b5e; margin-bottom:10px; }
  .result-card .stats { font-size:1.1rem; color:#666; margin-bottom:25px; line-height:1.8; }
  .result-card .stars-display { font-size:2.5rem; margin-bottom:20px; }
  .feedback-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border-radius:24px; padding:24px 44px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.25); z-index:1000; transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275); }
  .feedback-popup.show { transform:translate(-50%,-50%) scale(1); }
  .feedback-popup .icon { font-size:3.5rem; margin-bottom:6px; }
  .feedback-popup .msg { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#2d6b5e; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-120px) rotate(720deg);opacity:0} }
  .confetti { position:fixed; width:10px; height:10px; border-radius:50%; animation:confetti 1s ease forwards; z-index:999; pointer-events:none; }
  @media (max-width:600px) {
    .start-title { font-size:2rem; }
    .game-card { padding:20px; }
    .choice-btn { font-size:1.1rem; padding:12px 12px; }
    .spell-slot { min-width:38px; height:42px; font-size:1rem; }
    .letter-tile { padding:6px 10px; font-size:0.95rem; }
    .choice-emoji { font-size:4rem; }
    .spell-emoji { font-size:3rem; }
    .game-logo-sm { width:32px; height:32px; }
  }
</style>
</head>

hale", "zh": "鲸", "emoji": "🐋"}, {"en": "whole", "zh": "完整的", "emoji": "🍉"}];
const SPELL_DATA = [{"en": "black", "zh": "黑色", "emoji": "⬛", "parts": ["bl", "a", "ck"]}, {"en": "clap", "zh": "鼓掌", "emoji": "👏", "parts": ["cl", "a", "p"]}, {"en": "slip", "zh": "滑倒", "emoji": "🫠", "parts": ["sl", "i", "p"]}, {"en": "blink", "zh": "眨眼", "emoji": "😉", "parts": ["bl", "i", "nk"]}, {"en": "class", "zh": "班级", "emoji": "🏫", "parts": ["cl", "a", "ss"]}, {"en": "slide", "zh": "滑梯", "emoji": "🛝", "parts": ["sl", "i", "d", "e"]}, {"en": "globe", "zh": "地球仪", "emoji": "🌍", "parts": ["gl", "o", "b", "e"]}, {"en": "plus", "zh": "加", "emoji": "➕", "parts": ["pl", "u", "s"]}, {"en": "flag", "zh": "旗帜", "emoji": "🚩", "parts": ["fl", "a", "g"]}, {"en": "glass", "zh": "玻璃杯", "emoji": "🥛", "parts": ["gl", "a", "ss"]}, {"en": "plate", "zh": "盘子", "emoji": "🍽️", "parts": ["pl", "a", "t", "e"]}, {"en": "flame", "zh": "火焰", "emoji": "🔥", "parts": ["fl", "a", "m", "e"]}, {"en": "brick", "zh": "砖块", "emoji": "🧱", "parts": ["br", "i", "ck"]}, {"en": "grape", "zh": "葡萄", "emoji": "🍇", "parts": ["gr", "a", "p", "e"]}, {"en": "frog", "zh": "青蛙", "emoji": "🐸", "parts": ["fr", "o", "g"]}, {"en": "bride", "zh": "新娘", "emoji": "👰", "parts": ["br", "i", "d", "e"]}, {"en": "grill", "zh": "烤架", "emoji": "🍖", "parts": ["gr", "i", "ll"]}, {"en": "pram", "zh": "婴儿车", "emoji": "👶", "parts": ["pr", "a", "m"]}, {"en": "crab", "zh": "螃蟹", "emoji": "🦀", "parts": ["cr", "a", "b"]}, {"en": "drink", "zh": "喝", "emoji": "🥤", "parts": ["dr", "i", "nk"]}, {"en": "dress", "zh": "连衣裙", "emoji": "👗", "parts": ["dr", "e", "ss"]}, {"en": "truck", "zh": "卡车", "emoji": "🚚", "parts": ["tr", "u", "ck"]}, {"en": "trap", "zh": "陷阱", "emoji": "🪤", "parts": ["tr", "a", "p"]}, {"en": "write", "zh": "书写", "emoji": "✍️", "parts": ["wr", "i", "t", "e"]}, {"en": "stand", "zh": "站", "emoji": "🧍", "parts": ["st", "a", "n", "d"]}, {"en": "space", "zh": "宇宙", "emoji": "🚀", "parts": ["sp", "a", "c", "e"]}, {"en": "skunk", "zh": "臭鼬", "emoji": "🦨", "parts": ["sk", "u", "nk"]}, {"en": "scan", "zh": "扫描", "emoji": "📱", "parts": ["sc", "a", "n"]}, {"en": "stop", "zh": "停止", "emoji": "🛑", "parts": ["st", "o", "p"]}, {"en": "spot", "zh": "点", "emoji": "⚪", "parts": ["sp", "o", "t"]}, {"en": "skate", "zh": "溜冰鞋", "emoji": "⛸️", "parts": ["sk", "a", "t", "e"]}, {"en": "scare", "zh": "惊吓", "emoji": "👻", "parts": ["sc", "a", "r", "e"]}, {"en": "ship", "zh": "轮船", "emoji": "🚢", "parts": ["sh", "i", "p"]}, {"en": "chick", "zh": "小鸡", "emoji": "🐣", "parts": ["ch", "i", "ck"]}, {"en": "match", "zh": "火柴", "emoji": "🔥", "parts": ["m", "a", "t", "ch"]}, {"en": "phone", "zh": "电话", "emoji": "📱", "parts": ["ph", "o", "n", "e"]}, {"en": "dish", "zh": "盘子", "emoji": "🍽️", "parts": ["d", "i", "sh"]}, {"en": "bench", "zh": "长椅", "emoji": "🪑", "parts": ["b", "e", "n", "ch"]}, {"en": "witch", "zh": "女巫", "emoji": "🧙‍♀️", "parts": ["w", "i", "t", "ch"]}, {"en": "dolphin", "zh": "海豚", "emoji": "🐬", "parts": ["d", "o", "l", "ph", "i", "n"]}, {"en": "bath", "zh": "洗澡", "emoji": "🛁", "parts": ["b", "a", "th"]}, {"en": "this", "zh": "这个", "emoji": "👆", "parts": ["th", "i", "s"]}, {"en": "white", "zh": "白色的", "emoji": "⬜", "parts": ["wh", "i", "t", "e"]}, {"en": "who", "zh": "谁", "emoji": "❓", "parts": ["wh", "o"]}, {"en": "thank", "zh": "谢谢", "emoji": "🙏", "parts": ["th", "a", "nk"]}, {"en": "that", "zh": "那个", "emoji": "👉", "parts": ["th", "a", "t"]}, {"en": "whale", "zh": "鲸", "emoji": "🐋", "parts": ["wh", "a", "l", "e"]}, {"en": "whole", "zh": "完整的", "emoji": "🍉", "parts": ["wh", "o", "l", "e"]}];

let l1Order=[],l1Index=0,l1Errors=0,l1Locked=false;
let l2Order=[],l2Index=0,l2Errors=0,currentSlots=[],currentPool=[];

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function showLevel1(){
  l1Order=shuffle([...Array(CHOICE_DATA.length).keys()]);l1Index=0;l1Errors=0;l1Locked=false;
  showScreen('level1Screen');buildChoiceQ();
}

function buildChoiceQ(){
  if(l1Index>=l1Order.length){showLevel2();return}
  const prog=document.getElementById('choiceProgress');
  prog.innerHTML=l1Order.map((_,i)=>`<div class="choice-dot ${i<l1Index?'done':i===l1Index?'current':''}"></div>`).join('');
  const idx=l1Order[l1Index],w=CHOICE_DATA[idx];
  document.getElementById('choiceEmoji').textContent=w.emoji;
  document.getElementById('choiceZh').textContent=w.zh;
  let opts=[w.en];
  const all=CHOICE_DATA.map(x=>x.en).filter(e=>e!==w.en);
  const sh=shuffle(all);
  for(let i=0;i<3&&i<sh.length;i++)opts.push(sh[i]);
  opts=shuffle(opts);
  document.getElementById('choiceWords').innerHTML=opts.map(o=>`<button class="choice-btn" onclick="checkChoice(this,'${o}')">${o}</button>`).join('');
}

function checkChoice(btn,sel){
  if(l1Locked)return;
  const idx=l1Order[l1Index],cor=CHOICE_DATA[idx].en;
  if(sel===cor){
    l1Locked=true;btn.classList.add('correct');showFB('✅','太棒了！');l1Index++;
    setTimeout(()=>{hideFB();l1Locked=false;buildChoiceQ()},800);
  }else{btn.classList.add('wrong');l1Errors++;setTimeout(()=>btn.classList.remove('wrong'),500)}
}

function showLevel2(){
  l2Order=shuffle([...Array(SPELL_DATA.length).keys()]);l2Index=0;l2Errors=0;
  showScreen('level2Screen');buildSpellQ();
}

function buildSpellQ(){
  if(l2Index>=l2Order.length){showResult();return}
  const prog=document.getElementById('spellProgress');
  prog.innerHTML=l2Order.map((_,i)=>`<div class="choice-dot ${i<l2Index?'done':i===l2Index?'current':''}"></div>`).join('');
  const idx=l2Order[l2Index],d=SPELL_DATA[idx];
  document.getElementById('spellEmoji').textContent=d.emoji;
  document.getElementById('spellZh').textContent=d.zh;
  currentSlots=new Array(d.parts.length).fill(null);
  document.getElementById('spellSlots').innerHTML=d.parts.map((_,i)=>`<div class="spell-slot" data-slot="${i}" onclick="removeSlot(${i})"></div>`).join('');
  const corP=[...d.parts];const allP=new Set();SPELL_DATA.forEach(x=>x.parts.forEach(p=>allP.add(p)));
  const dist=[...allP].filter(p=>!corP.includes(p));
  const extras=shuffle(dist).slice(0,Math.min(3,dist.length));
  currentPool=shuffle([...corP,...extras]);
  document.getElementById('letterPool').innerHTML=currentPool.map((l,i)=>`<div class="letter-tile" data-pi="${i}" onclick="addSlot(${i})">${l}</div>`).join('');
}

function addSlot(pi){
  const tile=document.querySelector(`.letter-tile[data-pi="${pi}"]`);
  if(tile.classList.contains('used'))return;
  const l=currentPool[pi],es=currentSlots.indexOf(null);if(es===-1)return;
  currentSlots[es]={letter:l,pi};tile.classList.add('used');
  const se=document.querySelector(`.spell-slot[data-slot="${es}"]`);se.textContent=l;se.classList.add('filled');
  if(!currentSlots.includes(null))checkSpell();
}

function removeSlot(si){
  const d=currentSlots[si];if(!d)return;
  const se=document.querySelector(`.spell-slot[data-slot="${si}"]`);se.textContent='';se.classList.remove('filled');
  document.querySelector(`.letter-tile[data-pi="${d.pi}"]`).classList.remove('used');
  currentSlots[si]=null;
}

function checkSpell(){
  const idx=l2Order[l2Index],d=SPELL_DATA[idx];
  const ans=currentSlots.map(s=>s.letter).join(''),cor=d.parts.join('');
  if(ans===cor){
    document.querySelectorAll('.spell-slot').forEach(s=>s.classList.add('correct'));
    showFB('🎉','拼对了！');l2Index++;
    setTimeout(()=>{hideFB();buildSpellQ()},800);
  }else{
    document.querySelectorAll('.spell-slot.filled').forEach(s=>s.classList.add('wrong'));l2Errors++;
    setTimeout(()=>{currentSlots.forEach((s,i)=>{if(s)removeSlot(i)});document.querySelectorAll('.spell-slot').forEach(s=>s.classList.remove('wrong'))},600);
  }
}

function showFB(icon,msg){const p=document.getElementById('feedbackPopup');document.getElementById('feedbackIcon').textContent=icon;document.getElementById('feedbackMsg').textContent=msg;p.classList.add('show')}
function hideFB(){document.getElementById('feedbackPopup').classList.remove('show')}

function showResult(){
  const te=l1Errors+l2Errors,tq=CHOICE_DATA.length+SPELL_DATA.length;
  const acc=Math.round(((tq-te)/tq)*100);
  let trophy,title,sc;
  if(acc>=90){trophy='🏆';title='太厉害了！';sc=3}else if(acc>=70){trophy='🌟';title='做得不错！';sc=2}else{trophy='💪';title='继续加油！';sc=1}
  document.getElementById('resultTrophy').textContent=trophy;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultStars').textContent='⭐'.repeat(sc)+'☆'.repeat(3-sc);
  document.getElementById('resultStats').innerHTML=`选词关：${CHOICE_DATA.length}题，错${l1Errors}个<br>拼写关：${SPELL_DATA.length}题，错${l2Errors}个<br>总正确率：${acc}%`;
  showScreen('resultScreen');if(acc>=90)confetti();
}

function confetti(){
  const colors=['#FF6B6B','#FFD93D','#6BCB77','#5ec4b6','#FF8E53'];
  for(let i=0;i<30;i++){const c=document.createElement('div');c.className='confetti';c.style.background=colors[i%5];c.style.left=Math.random()*100+'vw';c.style.top=Math.random()*60+40+'vh';c.style.animationDelay=Math.random()*0.5+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),1500)}
}

function restartGame(){showScreen('startScreen')}
</script>
